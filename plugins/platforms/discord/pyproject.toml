[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "hermes-agent-discord"
version = "1.0.0"
description = "Discord gateway adapter for Hermes Agent"
requires-python = ">=3.11"
dependencies = [
    "hermes-agent",
    "discord.py[voice]==2.7.1",
    "brotlicffi==1.2.0.1",
]

[project.entry-points."hermes_agent.plugins"]
discord = "hermes_agent_discord:register"

[tool.setuptools.packages.find]
include = ["hermes_agent_discord*"]
